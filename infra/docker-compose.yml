services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clipper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.3.0
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garagedata:/var/lib/garage/data
      - garagemeta:/var/lib/garage/meta

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clipper
      NATS_URL: nats://nats:4222
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      garage:
        condition: service_started

  youtube-downloader:
    build:
      context: ..
      dockerfile: workers/youtube-downloader/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clipper
      NATS_URL: nats://nats:4222
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      garage:
        condition: service_started

  speech-to-text:
    build:
      context: ..
      dockerfile: workers/speech-to-text/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clipper
      NATS_URL: nats://nats:4222
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  clip-analyzer:
    build:
      context: ..
      dockerfile: workers/clip-analyzer/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clipper
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  face-tracking:
    build:
      context: ..
      dockerfile: workers/face-tracking/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clipper
      NATS_URL: nats://nats:4222
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      garage:
        condition: service_started

  subtitle-generator:
    build:
      context: ..
      dockerfile: workers/subtitle-generator/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clipper
      NATS_URL: nats://nats:4222
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      garage:
        condition: service_started

  renderer:
    build:
      context: ..
      dockerfile: workers/renderer/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clipper
      NATS_URL: nats://nats:4222
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      garage:
        condition: service_started

  nats:
    image: nats:2-alpine
    command: -js
    ports:
      - "4222:4222"
      - "8222:8222"

  temporal:
    image: temporalio/auto-setup:1.26
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      DBNAME: temporal
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-admin:
    image: temporalio/admin-tools:1.26
    depends_on:
      - temporal

volumes:
  pgdata:
  garagedata:
  garagemeta:
